<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="asset/image-asset/logo-bpm.png">
    <link rel="stylesheet" href="asset/image-asset/logo-bpm.png">
    <title>Administrasi Organisasi - BPM FPIK UBT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0F4C81 0%, #1B9AAA 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .maintenance-card {
            background: white;
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #0F4C81;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        p {
            color: #666;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #eef2f7;
            border-radius: 10px;
            margin: 25px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, #F4B942, #1B9AAA);
            border-radius: 10px;
            animation: loading 2s ease infinite;
        }

        @keyframes loading {
            0% { width: 45%; }
            50% { width: 75%; }
            100% { width: 45%; }
        }

        .btn-back {
            display: inline-block;
            background: #0F4C81;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-back:hover {
            background: #1B9AAA;
            transform: translateY(-2px);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eef2f7;
        }

        .feature-badge {
            background: #f0f7ff;
            color: #0F4C81;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .maintenance-card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon">💬</div>
        <h1>Fitur Administrasi Organisasi</h1>
        <p>Fitur Administrasi ORMAWA sedang dalam tahap pengembangan. Kami akan segera hadir untuk menampung suara dan masukan Anda.</p>
        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>
        <p style="font-size: 0.8rem; margin-top: -10px;">Target selesai: Juni 2026</p>
        <a href="../index.html" class="btn-back">← Kembali ke Beranda</a>
        <!-- <div class="features">
            <span class="feature-badge">📋 Penilaian Dosen</span>
            <span class="feature-badge">📱 QR Code</span>
            <span class="feature-badge">📊 Dashboard</span>
        </div> -->
    </div>
</body>
</html>
